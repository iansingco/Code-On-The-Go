<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d0d0d">
  <title>Stream Launcher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0d0d0d; --surface:#1a1a1a; --border:#2a2a2a;
      --accent:#6c63ff; --accent2:#00d4aa; --text:#e8e8e8;
      --muted:#777; --green:#22c55e; --red:#ef4444; --radius:14px;
    }
    html,body { min-height:100%; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      font-size:16px; -webkit-font-smoothing:antialiased; }

    .header { display:flex; align-items:center; justify-content:space-between;
      padding:20px 16px 12px; border-bottom:1px solid var(--border); }
    .header h1 { font-size:1.15rem; font-weight:700; letter-spacing:-.3px; }
    .header h1 span { color:var(--accent); }
    .header-meta { font-size:.75rem; color:var(--muted); text-align:right; }
    .main { padding:16px; max-width:640px; margin:0 auto; }

    .hint { background:rgba(108,99,255,.1); border:1px solid rgba(108,99,255,.3);
      border-radius:10px; padding:10px 14px; font-size:.8rem; color:var(--muted);
      margin-bottom:16px; }
    .hint b { color:var(--text); }

    .cards { display:flex; flex-direction:column; gap:12px; }
    .card { background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:16px; transition:border-color .2s; }
    .card.running { border-color:rgba(34,197,94,.35); }
    .card-top { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .card-icon { font-size:1.8rem; line-height:1; width:44px; text-align:center; flex-shrink:0; }
    .card-info { flex:1; min-width:0; }
    .card-label { font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-desc { font-size:.78rem; color:var(--muted); margin-top:2px; }
    .status-badge { display:flex; align-items:center; gap:6px; font-size:.75rem; font-weight:600; flex-shrink:0; }
    .dot { width:9px; height:9px; border-radius:50%; background:var(--muted); flex-shrink:0; }
    .dot.running { background:var(--green); box-shadow:0 0 0 0 rgba(34,197,94,.6); animation:pulse 2s infinite; }
    @keyframes pulse {
      0%   { box-shadow:0 0 0 0 rgba(34,197,94,.6); }
      70%  { box-shadow:0 0 0 6px rgba(34,197,94,0); }
      100% { box-shadow:0 0 0 0 rgba(34,197,94,0); }
    }
    .card-actions { display:flex; gap:8px; }
    .btn { flex:1; padding:11px 0; border:none; border-radius:10px; font-size:.875rem;
      font-weight:600; cursor:pointer; transition:opacity .15s,transform .1s;
      -webkit-tap-highlight-color:transparent; }
    .btn:active { transform:scale(.97); }
    .btn:disabled { opacity:.35; cursor:default; }
    .btn-open { background:var(--accent); color:#fff; }
    .btn-start { background:rgba(34,197,94,.15); color:var(--green); border:1px solid rgba(34,197,94,.3); }
    .btn-stop  { background:rgba(239,68,68,.12); color:var(--red);   border:1px solid rgba(239,68,68,.25); }
    .btn-loading { background:var(--border); color:var(--muted); }
    .uptime { font-size:.7rem; color:var(--muted); text-align:center; margin-top:8px; }

    .section-title { font-size:.8rem; font-weight:700; text-transform:uppercase;
      letter-spacing:.08em; color:var(--muted); margin:28px 0 10px; }
    .deploy-log { display:flex; flex-direction:column; gap:8px; }
    .deploy-entry { background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:12px 14px; font-size:.8rem; }
    .deploy-top { display:flex; justify-content:space-between; align-items:flex-start;
      gap:8px; margin-bottom:4px; }
    .deploy-branch { font-weight:700; color:var(--accent2); white-space:nowrap; }
    .deploy-time { color:var(--muted); font-size:.7rem; flex-shrink:0; }
    .deploy-msg { color:var(--text); margin-bottom:4px; }
    .deploy-meta { color:var(--muted); }
    .deploy-restarted { margin-top:4px; font-size:.72rem; color:var(--green); }
    .empty-log { color:var(--muted); font-size:.85rem; padding:12px 0; }
    .refresh-bar { height:2px; background:var(--border); border-radius:1px; margin:20px 0 0; overflow:hidden; }
    .refresh-bar-fill { height:100%; background:var(--accent); border-radius:1px; transition:width .4s linear; }
  </style>
</head>
<body>
<header class="header">
  <h1>Stream <span>Launcher</span></h1>
  <div class="header-meta">
    <div id="hostname"></div>
    <div id="last-update"></div>
  </div>
</header>
<main class="main">
  <div class="hint">
    Stream login — <b>Username:</b> kasm_user &nbsp;·&nbsp; <b>Password:</b> set via <code>KASM_PASSWORD</code> in .env
  </div>

  <div class="cards" id="cards">
    <div style="color:var(--muted);font-size:.85rem;padding:12px 0">Loading apps...</div>
  </div>

  <div class="section-title">CI/CD Deploy Log</div>
  <div class="deploy-log" id="deploy-log">
    <div class="empty-log">No deploys yet.</div>
  </div>
  <div class="refresh-bar"><div class="refresh-bar-fill" id="progress" style="width:0%"></div></div>
</main>
<script>
const POLL = 5000;
const host = window.location.hostname;
document.getElementById("hostname").textContent = host;
let busy = new Set(), progressTimer = null;

function appUrl(port) { return `https://${host}:${port}`; }

function formatUptime(s) {
  if (!s) return "";
  const d = Math.floor((Date.now() - new Date(s)) / 1000);
  if (d < 60) return `${d}s`;
  if (d < 3600) return `${Math.floor(d/60)}m`;
  if (d < 86400) return `${Math.floor(d/3600)}h ${Math.floor((d%3600)/60)}m`;
  return `${Math.floor(d/86400)}d`;
}

function renderCards(apps) {
  const c = document.getElementById("cards");
  if (!apps.length) { c.innerHTML='<div style="color:var(--muted);font-size:.85rem">No apps configured.</div>'; return; }
  c.innerHTML = apps.map(app => {
    const running = app.status === "running", b = busy.has(app.id);
    const uptime = running && app.startedAt ? `Up ${formatUptime(app.startedAt)}` : "";
    return `<div class="card ${running?"running":""}" id="card-${app.id}">
      <div class="card-top">
        <div class="card-icon">${app.icon||"📦"}</div>
        <div class="card-info">
          <div class="card-label">${app.label}</div>
          <div class="card-desc">${app.description||""}</div>
        </div>
        <div class="status-badge"><span class="dot ${running?"running":""}"></span><span>${running?"Running":"Stopped"}</span></div>
      </div>
      <div class="card-actions">
        <button class="btn btn-open" ${!running?"disabled":""} onclick="openApp(${app.port})">Open</button>
        ${b ? `<button class="btn btn-loading" disabled>...</button>`
            : running ? `<button class="btn btn-stop" onclick="toggleApp('${app.id}','stop')">Stop</button>`
                      : `<button class="btn btn-start" onclick="toggleApp('${app.id}','start')">Start</button>`}
      </div>
      ${uptime?`<div class="uptime">${uptime}</div>`:""}
    </div>`;
  }).join("");
}

function renderLog(entries) {
  const c = document.getElementById("deploy-log");
  if (!entries.length) { c.innerHTML='<div class="empty-log">No deploys yet.</div>'; return; }
  c.innerHTML = entries.map(e => {
    const d = new Date(e.ts);
    const t = d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    const dt = d.toLocaleDateString([],{month:"short",day:"numeric"});
    const r = e.restarted?.length ? `<div class="deploy-restarted">Restarted: ${e.restarted.join(", ")}</div>` : "";
    return `<div class="deploy-entry">
      <div class="deploy-top"><span class="deploy-branch">${e.repo} @ ${e.branch}</span><span class="deploy-time">${dt} ${t}</span></div>
      <div class="deploy-msg">${e.commitMsg||"(no message)"}</div>
      <div class="deploy-meta">by ${e.pusher}</div>${r}
    </div>`;
  }).join("");
}

function openApp(port) { window.open(appUrl(port), "_blank"); }

async function toggleApp(id, action) {
  busy.add(id);
  const card = document.getElementById(`card-${id}`);
  if (card) card.querySelectorAll(".btn:not(.btn-open)").forEach(b => { b.disabled=true; b.textContent="..."; b.className="btn btn-loading"; });
  await fetch(`/api/apps/${id}/${action}`, { method:"POST" }).catch(()=>{});
  await fetchAll();
  busy.delete(id);
}

async function fetchAll() {
  try {
    const [apps, log] = await Promise.all([
      fetch("/api/apps").then(r=>r.json()),
      fetch("/api/deploy/log").then(r=>r.json()),
    ]);
    renderCards(apps); renderLog(log);
    document.getElementById("last-update").textContent =
      "Updated " + new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  } catch {}
}

function startProgress() {
  const fill = document.getElementById("progress");
  let pct = 0; fill.style.width="0%";
  if (progressTimer) clearInterval(progressTimer);
  progressTimer = setInterval(() => { pct = Math.min(pct+(100/(POLL/100)),100); fill.style.width=pct+"%"; }, 100);
}

fetchAll(); startProgress();
setInterval(() => { fetchAll(); startProgress(); }, POLL);
</script>
</body>
</html>
