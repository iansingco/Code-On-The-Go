<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d0d0d">
  <title>Stream Launcher</title>
  <!-- xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0d0d0d; --surface:#1a1a1a; --border:#2a2a2a;
      --accent:#6c63ff; --accent2:#00d4aa; --text:#e8e8e8;
      --muted:#777; --green:#22c55e; --red:#ef4444;
      --yellow:#eab308; --radius:14px;
    }
    html,body { min-height:100%; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      font-size:16px; -webkit-font-smoothing:antialiased; }

    .header { display:flex; align-items:center; justify-content:space-between;
      padding:20px 16px 12px; border-bottom:1px solid var(--border); }
    .header h1 { font-size:1.15rem; font-weight:700; }
    .header h1 span { color:var(--accent); }
    .header-meta { font-size:.75rem; color:var(--muted); text-align:right; }
    .main { padding:16px; max-width:640px; margin:0 auto; }

    .hint { background:rgba(108,99,255,.1); border:1px solid rgba(108,99,255,.3);
      border-radius:10px; padding:10px 14px; font-size:.8rem; color:var(--muted); margin-bottom:16px; }
    .hint b { color:var(--text); }

    .cards { display:flex; flex-direction:column; gap:12px; }
    .card { background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:16px; transition:border-color .2s; }
    .card.running { border-color:rgba(34,197,94,.35); }
    .card.building { border-color:rgba(234,179,8,.4); }

    .card-top { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .card-icon { font-size:1.8rem; line-height:1; width:44px; text-align:center; flex-shrink:0; }
    .card-info { flex:1; min-width:0; }
    .card-label { font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-desc { font-size:.78rem; color:var(--muted); margin-top:2px; }

    .status-badge { display:flex; align-items:center; gap:6px; font-size:.75rem; font-weight:600; flex-shrink:0; }
    .dot { width:9px; height:9px; border-radius:50%; background:var(--muted); flex-shrink:0; }
    .dot.running { background:var(--green); animation:pulse 2s infinite; }
    .dot.building { background:var(--yellow); animation:pulse 1s infinite; }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:.4; }
    }

    .card-actions { display:flex; gap:8px; }
    .btn { flex:1; padding:11px 0; border:none; border-radius:10px; font-size:.875rem;
      font-weight:600; cursor:pointer; transition:opacity .15s,transform .1s;
      -webkit-tap-highlight-color:transparent; }
    .btn:active { transform:scale(.97); }
    .btn:disabled { opacity:.35; cursor:default; }
    .btn-open     { background:var(--accent); color:#fff; }
    .btn-start    { background:rgba(34,197,94,.15); color:var(--green); border:1px solid rgba(34,197,94,.3); }
    .btn-stop     { background:rgba(239,68,68,.12); color:var(--red);   border:1px solid rgba(239,68,68,.25); }
    .btn-rebuild  { background:rgba(234,179,8,.12); color:var(--yellow);border:1px solid rgba(234,179,8,.3); }
    .btn-loading  { background:var(--border); color:var(--muted); }

    .uptime { font-size:.7rem; color:var(--muted); text-align:center; margin-top:8px; }

    /* Build log */
    .build-log { margin-top:10px; background:#0a0a0a; border:1px solid var(--border);
      border-radius:8px; padding:10px 12px; font-family:monospace; font-size:.75rem;
      color:#aaa; max-height:120px; overflow-y:auto; display:none; }
    .build-log.visible { display:block; }
    .build-log .ok { color:var(--green); }
    .build-log .err { color:var(--red); }

    /* Deploy log */
    .section-title { font-size:.8rem; font-weight:700; text-transform:uppercase;
      letter-spacing:.08em; color:var(--muted); margin:28px 0 10px; }
    .deploy-entry { background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:12px 14px; font-size:.8rem; margin-bottom:8px; }
    .deploy-top { display:flex; justify-content:space-between; align-items:flex-start;
      gap:8px; margin-bottom:4px; }
    .deploy-branch { font-weight:700; color:var(--accent2); }
    .deploy-time { color:var(--muted); font-size:.7rem; flex-shrink:0; }
    .deploy-msg { margin-bottom:3px; }
    .deploy-meta { color:var(--muted); }
    .deploy-badge { display:inline-block; font-size:.7rem; font-weight:600;
      padding:2px 7px; border-radius:20px; margin-top:4px; margin-right:4px; }
    .badge-restart { background:rgba(34,197,94,.15); color:var(--green); }
    .badge-rebuild { background:rgba(234,179,8,.15); color:var(--yellow); }
    .badge-files   { background:rgba(108,99,255,.12); color:#a89cff; }
    .empty { color:var(--muted); font-size:.85rem; padding:8px 0; }

    .refresh-bar { height:2px; background:var(--border); border-radius:1px; margin:20px 0 0; overflow:hidden; }
    .refresh-bar-fill { height:100%; background:var(--accent); border-radius:1px; transition:width .4s linear; }

    /* Clone form */
    .clone-form { display:flex; gap:8px; margin-bottom:6px; }
    .clone-input { flex:1; background:#111; border:1px solid var(--border); border-radius:10px;
      color:var(--text); font-size:.85rem; padding:10px 12px; outline:none; }
    .clone-input:focus { border-color:var(--accent); }
    .btn-clone { flex:0 0 auto; padding:10px 16px; background:var(--accent2);
      color:#000; border:none; border-radius:10px; font-size:.85rem; font-weight:700;
      cursor:pointer; white-space:nowrap; }
    .btn-clone:disabled { opacity:.4; cursor:default; }
    .clone-result { font-size:.78rem; padding:4px 2px; min-height:1.2em; }
    .clone-result.ok  { color:var(--green); }
    .clone-result.err { color:var(--red); }

    /* Terminal */
    .terminal-wrap { background:#0a0a0a; border:1px solid var(--border);
      border-radius:10px; overflow:hidden; margin-bottom:4px; }
    .terminal-toolbar { display:flex; align-items:center; justify-content:space-between;
      padding:6px 12px; background:#111; border-bottom:1px solid var(--border); }
    .terminal-title { font-size:.75rem; color:var(--muted); font-weight:600; letter-spacing:.05em; text-transform:uppercase; }
    .btn-term-toggle { background:none; border:none; color:var(--muted); font-size:.75rem;
      cursor:pointer; padding:2px 6px; border-radius:6px; }
    .btn-term-toggle:hover { background:var(--border); color:var(--text); }
    #terminal-body { padding:8px; display:none; }
    #terminal-body.open { display:block; }
    .xterm-viewport { border-radius:0 !important; }
  </style>
</head>
<body>
<header class="header">
  <h1>Stream <span>Launcher</span></h1>
  <div class="header-meta">
    <div id="hostname"></div>
    <div id="last-update"></div>
  </div>
</header>
<main class="main">
  <div class="hint">
    Stream login — <b>Username:</b> kasm_user &nbsp;·&nbsp;
    <b>Password:</b> <code>KASM_PASSWORD</code> from .env
  </div>

  <div class="cards" id="cards">
    <div style="color:var(--muted);font-size:.85rem;padding:12px 0">Loading...</div>
  </div>

  <!-- Clone Repo -->
  <div class="section-title">Clone Repo</div>
  <div class="clone-form">
    <input class="clone-input" id="clone-url" type="url" placeholder="https://github.com/user/repo.git">
    <button class="btn-clone" id="clone-btn" onclick="cloneRepo()">Clone</button>
  </div>
  <div class="clone-result" id="clone-result"></div>

  <!-- Terminal -->
  <div class="section-title" style="margin-top:24px">Terminal</div>
  <div class="terminal-wrap">
    <div class="terminal-toolbar">
      <span class="terminal-title">bash — launcher container</span>
      <button class="btn-term-toggle" id="term-toggle" onclick="toggleTerminal()">Show</button>
    </div>
    <div id="terminal-body">
      <div id="xterm-container"></div>
    </div>
  </div>

  <div class="section-title">CI/CD Deploy Log</div>
  <div id="deploy-log"><div class="empty">No deploys yet.</div></div>
  <div class="refresh-bar"><div class="refresh-bar-fill" id="progress" style="width:0%"></div></div>
</main>

<!-- xterm.js + addon-fit from CDN -->
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>

<script>
const POLL = 5000;
const host = window.location.hostname;
document.getElementById("hostname").textContent = host;

// Per-app state: busy (start/stop), building, buildLog
const state = {};

function getState(id) {
  if (!state[id]) state[id] = { busy: false, building: false, log: [] };
  return state[id];
}

function appUrl(port) { return `https://${host}:${port}`; }

function formatUptime(s) {
  if (!s) return "";
  const d = Math.floor((Date.now() - new Date(s)) / 1000);
  if (d < 60) return `${d}s`;
  if (d < 3600) return `${Math.floor(d/60)}m`;
  if (d < 86400) return `${Math.floor(d/3600)}h ${Math.floor((d%3600)/60)}m`;
  return `${Math.floor(d/86400)}d`;
}

function renderCards(apps) {
  const c = document.getElementById("cards");
  if (!apps.length) { c.innerHTML='<div style="color:var(--muted)">No apps in apps.config.json.</div>'; return; }

  c.innerHTML = apps.map(app => {
    const s = getState(app.id);
    const running = app.status === "running";
    const uptime = running && app.startedAt ? `Up ${formatUptime(app.startedAt)}` : "";
    const dotClass = s.building ? "building" : running ? "running" : "";
    const statusLabel = s.building ? "Building…" : running ? "Running" : "Stopped";
    const cardClass = s.building ? "building" : running ? "running" : "";

    // Action buttons
    let actionBtns = "";
    if (s.busy || s.building) {
      actionBtns = `<button class="btn btn-loading" disabled>${s.building ? "Building…" : "…"}</button>`;
    } else if (running) {
      actionBtns = `<button class="btn btn-stop" onclick="toggleApp('${app.id}','stop')">Stop</button>`;
    } else if (!app.imageReady) {
      // Custom dockerfile but image hasn't been built yet — Rebuild builds + starts automatically
      actionBtns = `<button class="btn btn-rebuild" onclick="rebuild('${app.id}')">Build &amp; Start</button>`;
    } else {
      actionBtns = `<button class="btn btn-start" onclick="toggleApp('${app.id}','start')">Start</button>`;
    }

    // Only show separate Rebuild button when the image is already built (running or stopped)
    const rebuildBtn = app.rebuildable && app.imageReady && !s.busy && !s.building
      ? `<button class="btn btn-rebuild" onclick="rebuild('${app.id}')">Rebuild</button>`
      : "";

    const logHtml = s.log.length
      ? `<div class="build-log visible" id="log-${app.id}">${s.log.map(l =>
          `<div class="${l.error?'err':l.done?'ok':''}">${l.msg || (l.done ? '✓ Done' : l.error || '')}</div>`
        ).join("")}</div>`
      : `<div class="build-log" id="log-${app.id}"></div>`;

    return `<div class="card ${cardClass}" id="card-${app.id}">
      <div class="card-top">
        <div class="card-icon">${app.icon||"📦"}</div>
        <div class="card-info">
          <div class="card-label">${app.label}</div>
          <div class="card-desc">${app.description||""}</div>
        </div>
        <div class="status-badge">
          <span class="dot ${dotClass}"></span>
          <span>${statusLabel}</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn btn-open" ${!running||s.building?"disabled":""} onclick="openApp(${app.port})">Open</button>
        ${actionBtns}
        ${rebuildBtn}
      </div>
      ${uptime ? `<div class="uptime">${uptime}</div>` : ""}
      ${logHtml}
    </div>`;
  }).join("");
}

function renderLog(entries) {
  const c = document.getElementById("deploy-log");
  if (!entries.length) { c.innerHTML='<div class="empty">No deploys yet.</div>'; return; }
  c.innerHTML = entries.map(e => {
    const d = new Date(e.ts);
    const t = d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    const dt = d.toLocaleDateString([],{month:"short",day:"numeric"});
    const restartedBadge = e.restarted?.length
      ? `<span class="deploy-badge badge-restart">↺ ${e.restarted.join(", ")}</span>` : "";
    const rebuiltBadge = e.rebuilt?.length
      ? `<span class="deploy-badge badge-rebuild">🔨 rebuilt: ${e.rebuilt.join(", ")}</span>` : "";
    const filesBadge = e.changedFiles?.length
      ? `<span class="deploy-badge badge-files">${e.changedFiles.length} file${e.changedFiles.length>1?"s":""} changed</span>` : "";
    return `<div class="deploy-entry">
      <div class="deploy-top">
        <span class="deploy-branch">${e.repo} @ ${e.branch}</span>
        <span class="deploy-time">${dt} ${t}</span>
      </div>
      <div class="deploy-msg">${e.commitMsg||"(no message)"}</div>
      <div class="deploy-meta">by ${e.pusher}</div>
      <div style="margin-top:6px">${restartedBadge}${rebuiltBadge}${filesBadge}</div>
    </div>`;
  }).join("");
}

// ── Clone Repo ────────────────────────────────────────────────────────────────

async function cloneRepo() {
  const urlInput = document.getElementById("clone-url");
  const btn = document.getElementById("clone-btn");
  const result = document.getElementById("clone-result");
  const url = urlInput.value.trim();
  if (!url) return;

  btn.disabled = true;
  result.textContent = "Cloning…";
  result.className = "clone-result";

  try {
    const res = await fetch("/api/clone", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url }),
    });
    const data = await res.json();
    if (res.ok) {
      result.textContent = `✓ Cloned to ${data.path}  (${data.stack})`;
      result.className = "clone-result ok";
      urlInput.value = "";
    } else {
      result.textContent = `✗ ${data.error}`;
      result.className = "clone-result err";
    }
  } catch (e) {
    result.textContent = `✗ ${e.message}`;
    result.className = "clone-result err";
  }
  btn.disabled = false;
}

document.getElementById("clone-url").addEventListener("keydown", e => {
  if (e.key === "Enter") cloneRepo();
});

// ── xterm.js Terminal ─────────────────────────────────────────────────────────

let term = null;
let fitAddon = null;
let termWs = null;
let termOpen = false;

function initTerminal() {
  if (term) return;
  term = new Terminal({
    theme: { background:"#0a0a0a", foreground:"#e8e8e8", cursor:"#6c63ff" },
    fontFamily: "monospace",
    fontSize: 13,
    cursorBlink: true,
    convertEol: true,
  });
  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById("xterm-container"));
  fitAddon.fit();

  // Connect WebSocket
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  termWs = new WebSocket(`${proto}//${location.host}/terminal`);

  termWs.onopen = () => term.writeln("\x1b[32mConnected.\x1b[0m");
  termWs.onclose = () => term.writeln("\x1b[31m[connection closed]\x1b[0m");
  termWs.onerror = () => term.writeln("\x1b[31m[WebSocket error]\x1b[0m");

  termWs.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === "output") term.write(msg.data);
    } catch {}
  };

  term.onData((data) => {
    if (termWs.readyState === WebSocket.OPEN)
      termWs.send(JSON.stringify({ type: "input", data }));
  });

  term.onResize(({ cols, rows }) => {
    if (termWs.readyState === WebSocket.OPEN)
      termWs.send(JSON.stringify({ type: "resize", cols, rows }));
  });
}

function toggleTerminal() {
  const body = document.getElementById("terminal-body");
  const btn = document.getElementById("term-toggle");
  termOpen = !termOpen;
  body.className = termOpen ? "open" : "";
  btn.textContent = termOpen ? "Hide" : "Show";
  if (termOpen) {
    initTerminal();
    requestAnimationFrame(() => fitAddon && fitAddon.fit());
  }
}

window.addEventListener("resize", () => {
  if (termOpen && fitAddon) fitAddon.fit();
});

// ── Actions ───────────────────────────────────────────────────────────────────

function openApp(port) { window.open(appUrl(port), "_blank"); }

async function toggleApp(id, action) {
  getState(id).busy = true;
  await fetchAll();
  try { await fetch(`/api/apps/${id}/${action}`, { method:"POST" }); } catch {}
  await fetchAll();
  getState(id).busy = false;
  await fetchAll();
}

async function rebuild(id) {
  const s = getState(id);
  s.building = true;
  s.log = [];
  await fetchAll();

  try {
    const res = await fetch(`/api/apps/${id}/rebuild`);
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data:")) continue;
        try {
          const data = JSON.parse(line.slice(5).trim());
          s.log.push(data);
          // Scroll build log to bottom
          const el = document.getElementById(`log-${id}`);
          if (el) { el.classList.add("visible"); el.scrollTop = el.scrollHeight; }
          renderCards(await fetch("/api/apps").then(r=>r.json()));
        } catch {}
      }
    }
  } catch (e) {
    s.log.push({ error: e.message });
  }

  s.building = false;
  await fetchAll();
}

// ── Polling ───────────────────────────────────────────────────────────────────

let cachedApps = [];

async function fetchAll() {
  try {
    const [apps, log] = await Promise.all([
      fetch("/api/apps").then(r=>r.json()),
      fetch("/api/deploy/log").then(r=>r.json()),
    ]);
    cachedApps = apps;
    renderCards(apps);
    renderLog(log);
    document.getElementById("last-update").textContent =
      new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  } catch {}
}

let progressTimer = null;
function startProgress() {
  const fill = document.getElementById("progress");
  let pct = 0; fill.style.width = "0%";
  if (progressTimer) clearInterval(progressTimer);
  progressTimer = setInterval(() => {
    pct = Math.min(pct + (100/(POLL/100)), 100);
    fill.style.width = pct + "%";
  }, 100);
}

fetchAll(); startProgress();
setInterval(() => { fetchAll(); startProgress(); }, POLL);
</script>
</body>
</html>
