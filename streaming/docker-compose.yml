# ─────────────────────────────────────────────
# KASM Workspaces — Generic Streaming Setup
#
# KASM replaces the custom launcher. It provides:
#   - Its own web portal (start sessions, pick workspaces)
#   - User account management
#   - Per-session disposable containers
#   - Built-in streaming (KasmVNC over HTTPS)
#
# Ports:
#   3000  — First-time setup wizard (only needed once)
#   8443  — Main KASM portal (use this day-to-day)
#   8080  — Webhook receiver for CI/CD git deploys
#
# First run:
#   1. docker compose up -d
#   2. Open https://<ip>:3000 to run the setup wizard
#   3. After setup, use https://<ip>:8443 for everything
#
# Adding workspaces:
#   Build a workspace image (see workspaces/) then register it in
#   KASM admin panel → Workspaces → Add Workspace → Docker image name.
# ─────────────────────────────────────────────

services:

  # ── KASM Platform ──────────────────────────
  # Single container that runs the full KASM stack (Docker-in-Docker).
  # It manages its own internal Docker daemon to spin up workspace sessions.
  kasm:
    image: lscr.io/linuxserver/kasm:latest
    container_name: kasm
    privileged: true
    security_opt:
      - apparmor:rootlesskit
    environment:
      - KASM_PORT=8443
    volumes:
      - ./data/kasm:/opt          # KASM data, workspace images, DB
      - ./data/profiles:/profiles  # optional persistent user profiles
    ports:
      - "3000:3000"   # setup wizard
      - "8443:8443"   # main portal
    restart: unless-stopped

  # ── CI/CD Webhook ──────────────────────────
  # Receives GitHub push webhooks → runs git pull → optionally rebuilds
  # workspace images. Provides a simple status page at :8080.
  # KASM itself is NOT controlled from here — manage workspaces via
  # the KASM admin panel at https://<ip>:8443.
  webhook:
    build: ./webhook
    restart: unless-stopped
    ports:
      - "8080:3000"
    volumes:
      - .:/repo                   # repo root for git pull
      - /var/run/docker.sock:/var/run/docker.sock  # to rebuild workspace images
    environment:
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-changeme}"
      KASM_URL: "https://${HOST_IP:-localhost}:8443"
      GIT_DIR: /repo
