# ─────────────────────────────────────────────
# KASM Standalone Streaming Setup
#
# Runs kasmweb workspace images directly — no KASM platform needed.
# Each container has KasmVNC built in and streams over HTTPS to a browser tab.
# Works on Docker Desktop for Windows (no Docker-in-Docker required).
#
# Access each stream at https://<ip>:<port>
#   Login: kasm_user / <KASM_PASSWORD from .env>
#
# Ports:
#   8080  — Launcher UI (start/stop/open all apps)
#   6901  — Claude Code (full desktop + Claude Code CLI pre-installed)
#
# To add more apps:
#   1. Add a service below (copy the claude-code block, bump the host port)
#   2. Add an entry in apps.config.json
# ─────────────────────────────────────────────

services:

  # ── Launcher ───────────────────────────────
  launcher:
    build: ./launcher
    restart: unless-stopped
    ports:
      - "8080:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./apps.config.json:/app/apps.config.json:ro
      - .:/repo
    environment:
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-changeme}"
      COMPOSE_PROJECT: "${COMPOSE_PROJECT:-streaming}"
      GIT_DIR: /repo

  # ── Claude Code ────────────────────────────
  # Full XFCE desktop with Claude Code CLI, Cursor IDE, Gemini CLI
  # pre-installed. Set ANTHROPIC_API_KEY in .env before launching.
  # Open stream at https://<ip>:6901  —  login: kasm_user / KASM_PASSWORD
  claude-code:
    image: kasmweb/ubuntu-jammy-desktop-ai-dev:1.18.0-rolling-daily
    restart: unless-stopped
    ports:
      - "6901:6901"
    environment:
      VNC_PW: "${KASM_PASSWORD:-password}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - ./workspace:/home/kasm-user/workspace
    shm_size: "512mb"

  # ── Add more apps here ──────────────────────
  # Example — plain desktop (no AI tools):
  #
  # desktop:
  #   image: kasmweb/ubuntu-jammy-desktop:1.18.0-rolling-daily
  #   restart: unless-stopped
  #   ports:
  #     - "6902:6901"
  #   environment:
  #     VNC_PW: "${KASM_PASSWORD:-password}"
  #   shm_size: "512mb"
