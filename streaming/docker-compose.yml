# ─────────────────────────────────────────────
# Streaming Launcher
#
# Only the launcher runs via docker-compose.
# All workspace containers (kasmweb apps) are started/stopped/rebuilt
# dynamically by the launcher from apps.config.json — no docker-compose
# changes needed when adding a new app.
#
# To add a new app:
#   1. Add an entry to apps.config.json
#   2. Hit Start in the launcher UI at http://<ip>:8080
#
# Ports:
#   8080  — Launcher UI + CI/CD webhook
#   6901+ — Workspace streams (assigned per app in apps.config.json)
# ─────────────────────────────────────────────

services:
  launcher:
    build: ./launcher
    restart: unless-stopped
    ports:
      - "8080:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./apps.config.json:/app/apps.config.json:ro
      - .:/repo
    environment:
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-changeme}"
      KASM_PASSWORD: "${KASM_PASSWORD:-password}"
      # HOST_REPO_PATH must be the absolute path to this streaming/ directory
      # on the HOST machine (used when mounting workspace volumes into app containers).
      # On Windows: C:\Users\you\Documents\GitHub\Code-On-The-Go\streaming
      # On Linux/Mac: /home/you/Code-On-The-Go/streaming
      HOST_REPO_PATH: "${HOST_REPO_PATH}"
      GIT_DIR: /repo
