services:

  # ── Launcher ───────────────────────────────────────────────────────────────
  # Manages all workspace containers dynamically from apps.config.json.
  # Access at http://<host>:8080
  launcher:
    build: ./launcher
    restart: unless-stopped
    ports:
      - "8080:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./apps.config.json:/app/apps.config.json:ro
      - .:/repo
      # Mount source files so nodemon picks up git pull without a rebuild.
      # node_modules stays inside the container (not overwritten by the mount).
      - ./launcher/server.js:/app/server.js
      - ./launcher/public:/app/public
    environment:
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-changeme}"
      KASM_PASSWORD: "${KASM_PASSWORD:-password}"
      HOST_REPO_PATH: "${HOST_REPO_PATH}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GIT_DIR: /repo
