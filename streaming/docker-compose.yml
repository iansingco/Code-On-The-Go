# ─────────────────────────────────────────────
# KASM Standalone Streaming Setup
#
# Runs kasmweb workspace images directly — no KASM platform needed.
# Each container has KasmVNC built in and streams over HTTPS to a browser tab.
# Works on Docker Desktop for Windows (no Docker-in-Docker required).
#
# Access each stream at https://<ip>:<port>
#   Login: kasm_user / <KASM_PASSWORD from .env>
#
# Ports:
#   8080  — Launcher UI (start/stop/open all apps)
#   6901  — Desktop (full XFCE Linux desktop)
#   6902  — Claude Code terminal
#
# To add a new app:
#   1. Add a service below (copy a block, bump the host port)
#   2. Add an entry in apps.config.json
#   3. Optionally create a custom image in workspaces/<name>/
# ─────────────────────────────────────────────

services:

  # ── Launcher ───────────────────────────────
  launcher:
    build: ./launcher
    restart: unless-stopped
    ports:
      - "8080:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./apps.config.json:/app/apps.config.json:ro
      - .:/repo
    environment:
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-changeme}"
      COMPOSE_PROJECT: "${COMPOSE_PROJECT:-streaming}"
      GIT_DIR: /repo

  # ── Full Desktop ────────────────────────────
  # Pre-built kasmweb image — full XFCE desktop with browser, terminal, etc.
  # No custom Dockerfile needed.
  desktop:
    image: kasmweb/ubuntu-jammy-desktop:latest
    restart: unless-stopped
    ports:
      - "6901:6901"
    environment:
      VNC_PW: "${KASM_PASSWORD:-password}"
    shm_size: "512mb"

  # ── Claude Code terminal ────────────────────
  # Custom workspace image with Node 20 + Claude Code pre-installed.
  # Build: docker compose build claude-code
  claude-code:
    build: ./workspaces/claude-code
    restart: unless-stopped
    ports:
      - "6902:6901"
    environment:
      VNC_PW: "${KASM_PASSWORD:-password}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - ./workspace:/home/kasm-user/workspace
    shm_size: "512mb"
