<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0d0d0d">
  <title>Deploy Status</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #1a1a1a; --border: #2a2a2a;
      --accent: #6c63ff; --accent2: #00d4aa; --text: #e8e8e8;
      --muted: #777; --green: #22c55e; --radius: 14px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; -webkit-font-smoothing: antialiased; }
    .header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 1.1rem; font-weight: 700; }
    .header h1 span { color: var(--accent); }
    .main { padding: 16px; max-width: 640px; margin: 0 auto; }

    .kasm-btn {
      display: block; width: 100%; padding: 16px;
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius); font-size: 1rem; font-weight: 700;
      text-align: center; text-decoration: none; cursor: pointer;
      margin-bottom: 20px;
    }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
    .label { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 4px; }
    .value { font-size: .9rem; font-family: monospace; color: var(--text); word-break: break-all; }

    .section-title { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 24px 0 10px; }

    .deploy-entry { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; font-size: .8rem; }
    .deploy-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .deploy-branch { font-weight: 700; color: var(--accent2); }
    .deploy-time { color: var(--muted); font-size: .7rem; }
    .deploy-msg { margin-bottom: 3px; }
    .deploy-meta { color: var(--muted); }
    .empty { color: var(--muted); font-size: .85rem; padding: 8px 0; }
  </style>
</head>
<body>
<header class="header">
  <h1>Deploy <span>Status</span></h1>
  <span style="font-size:.75rem;color:var(--muted)" id="updated"></span>
</header>
<main class="main">
  <a class="kasm-btn" id="kasm-link" href="#" target="_blank">Open KASM Workspaces →</a>

  <div class="card">
    <div class="label">Latest commit</div>
    <div class="value" id="git-head">—</div>
  </div>

  <div class="section-title">Deploy Log</div>
  <div id="log"><div class="empty">No deploys yet.</div></div>
</main>
<script>
async function refresh() {
  const { kasmUrl, gitHead, deployLog } = await fetch("/api/status").then(r => r.json());
  document.getElementById("kasm-link").href = kasmUrl;
  document.getElementById("git-head").textContent = gitHead || "—";
  document.getElementById("updated").textContent =
    new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });

  const log = document.getElementById("log");
  if (!deployLog.length) { log.innerHTML = '<div class="empty">No deploys yet.</div>'; return; }
  log.innerHTML = deployLog.map(e => {
    const d = new Date(e.ts);
    const t = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    const dt = d.toLocaleDateString([], { month: "short", day: "numeric" });
    return `<div class="deploy-entry">
      <div class="deploy-top"><span class="deploy-branch">${e.repo} @ ${e.branch}</span><span class="deploy-time">${dt} ${t}</span></div>
      <div class="deploy-msg">${e.commitMsg || "(no message)"}</div>
      <div class="deploy-meta">by ${e.pusher}</div>
    </div>`;
  }).join("");
}
refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
